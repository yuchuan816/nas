services:
  windows:
    image: dockurr/windows:latest  
    container_name: windows
    restart: unless-stopped
    privileged: true                          # 需要特权模式
    environment:
      # - VERSION=10                          # Windows版本，如 "xp", "7", "10", "11"
      - USERNAME=tom                          # 自定义用户名
      - PASSWORD=95816                        # 自定义密码
      - RAM_SIZE=3G                           # 内存大小
      - CPU_CORES=2                           # CPU核心数 (去掉引号防止QEMU报错)
      - DISK_SIZE=32G                         # 磁盘大小
    ports:
      # - "8006:8006"                         # noVNC Web访问端口
      # - 3389:3389/tcp                       # RDP端口 (可选映射)
      # - 3389:3389/udp                       # RDP端口 (可选映射)
    devices:
      - /dev/kvm                               # 传递KVM设备以加速（若宿主机支持）
    volumes:
      # - ./volumes/win10.SW_DVD9_WIN_ENT_LTSC_2021_64BIT_ChnSimp_MLF_X22-84402.iso:/boot.iso
      - ./volumes:/storage                     # 挂载存储卷，持久化系统数
      - /mnt/common/shares/windows-storage:/data
    networks:
      - webnet

networks:
  webnet:
    external: true